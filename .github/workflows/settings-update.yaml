name: Settings Update

permissions:
  contents: read
  actions: write
  checks: write

on:
  repository_dispatch:
    types: [ initialized ]
  push:
    branches:
      - main
      - master

jobs:
  run_settings_script:
    runs-on: ubuntu-2-cores-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: MESSAGE FOR REPOSITORY ADMINISTRATORS
      run: echo "If this Action fails please contact the Configuration Management team to set up your Personal Access Token."

    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install python-dotenv

    - name: Run Python Script
      env:
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      run: |
        python .cmd/update_settings.py
